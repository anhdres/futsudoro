  <h1>Futsudoro</h1>
  <p>Futsudoro 是一款列车主题的专注计时器，让你像乘坐慢车一样，一站一站推进工作。</p>

  <h2>两种时间模式</h2>
  <ul>
    <li><b>Chronos（Χρόνος）</b>：严格节奏，到时自动切换阶段。</li>
    <li><b>Kairos（Καιρός）</b>：到点提醒，但何时进入下一阶段由你决定。</li>
  </ul>
