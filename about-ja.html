  <p>Futsudoro は、駅ごとに進む列車スタイルの集中タイマーです。</p>

  <h2>2つの時間モード</h2>
  <ul>
    <li><b>Chronos（Χρόνος）</b>：厳格モード。時間になると自動で次のフェーズへ進みます。</li>
    <li><b>Kairos（Καιρός）</b>：到達時に通知。次へ進むタイミングは自分で決められます。</li>
  </ul>
